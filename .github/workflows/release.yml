name: Release

# 触发条件：
# 1. 推送 v* tag 时自动构建并发布 Release
# 2. 在 Actions 页手动点击 "Run workflow" 调试（需输入 tag 名，如 v1.0.1）
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的版本 tag（如 v1.0.1）"
        required: true
        default: "v1.0.1"

# 允许 workflow 创建 Release、上传产物。
permissions:
  contents: write

jobs:
  build:
    name: 交叉编译并发布
    runs-on: ubuntu-latest
    steps:
      # 拉取代码。fetch-depth: 0 保证 git describe 能读到 tag 历史。
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      # 计算版本信息，供 -ldflags 注入。
      - name: 生成版本信息
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # 生成 Windows exe 图标资源（.syso），编译 windows 目标时会自动链接。
      - name: 生成 Windows 图标资源
        run: go run github.com/akavel/rsrc@latest -ico logo.ico -o rsrc_windows.syso

      # 交叉编译四个平台，产物输出到 dist/。
      - name: 交叉编译
        env:
          CGO_ENABLED: "0"
          VERSION: ${{ steps.vars.outputs.version }}
          COMMIT: ${{ steps.vars.outputs.commit }}
          BUILD_TIME: ${{ steps.vars.outputs.build_time }}
        run: |
          set -euo pipefail
          APP_NAME="aceshare"
          # 发布产物文件名带上版本号，便于识别（如 aceshare-v1.0.3-windows-amd64.exe）。
          NAME="${APP_NAME}-${VERSION}"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildTime=${BUILD_TIME}"
          mkdir -p dist
          build() {
            local goos="$1" goarch="$2" out="$3"
            echo "编译 ${goos}/${goarch} -> dist/${out}"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$LDFLAGS" -o "dist/${out}" .
          }
          build windows amd64 "${NAME}-windows-amd64.exe"
          build linux   amd64 "${NAME}-linux-amd64"
          build darwin  amd64 "${NAME}-macos-amd64"
          build darwin  arm64 "${NAME}-macos-arm64"
          ls -lh dist

      # 创建 GitHub Release 并上传 dist/ 下所有产物。
      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          files: dist/*
