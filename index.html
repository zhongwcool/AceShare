<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<title>局域网文件与文本分享</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f5f7;
    --panel: #ffffff;
    --panel-2: #f0f2f5;
    --border: #e2e5ea;
    --text: #1f2328;
    --text-dim: #6b7280;
    --accent: #2f6feb;
    --accent-text: #ffffff;
    --code-bg: #f6f8fa;
    --code-border: #e2e5ea;
    --ok: #1a7f37;
    --err: #cf222e;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #9198a1;
      --accent: #4c8dff;
      --accent-text: #0d1117;
      --code-bg: #0b0f14;
      --code-border: #30363d;
      --ok: #3fb950;
      --err: #f85149;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .layout { flex: 1 0 auto; }

  header {
    padding: 20px 24px 12px;
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
  }
  header h1 { font-size: 20px; margin: 0 0 4px; font-weight: 700; }
  header .app-version {
    margin: 0;
    color: var(--text-dim);
    font-size: 13px;
    font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
  }
  header .app-version a.update-hint {
    color: var(--ok);
    text-decoration: none;
    font-weight: 600;
  }
  header .app-version a.update-hint:hover {
    text-decoration: underline;
  }

  .layout {
    max-width: 1200px;
    margin: 0 auto;
    padding: 8px 24px 40px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  @media (min-width: 900px) {
    .layout { grid-template-columns: minmax(300px, 1fr) minmax(340px, 1.3fr); align-items: start; }
  }

  .col { display: flex; flex-direction: column; gap: 20px; min-width: 0; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card > h2 {
    font-size: 14px;
    font-weight: 700;
    margin: 0;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card > h2 .count {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 9px;
  }
  .card-body { padding: 14px 18px; }

  /* 状态提示 */
  .status { color: var(--text-dim); font-size: 14px; padding: 6px 2px; }
  .status.error { color: var(--err); }

  /* 文件列表 */
  ul.file-list { list-style: none; margin: 0; padding: 0; }
  ul.file-list li { border-bottom: 1px solid var(--border); }
  ul.file-list li:last-child { border-bottom: none; }
  ul.file-list a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 4px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    word-break: break-all;
  }
  ul.file-list a:hover { color: var(--accent); }
  ul.file-list a .ico { flex: none; opacity: .7; }
  ul.file-list a .dl {
    margin-left: auto;
    flex: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    color: var(--text-dim);
    transition: background 0.15s, color 0.15s;
  }
  ul.file-list a .dl svg { width: 17px; height: 17px; }
  ul.file-list a:hover .dl { color: var(--accent); background: rgba(127, 127, 127, 0.14); }

  /* 文本条目通用（参考 nginx 原页风格）*/
  .item { margin-top: 0.55rem; }
  .item:first-child { margin-top: 0.35rem; }
  .item .item-title {
    margin: 0.05rem 0 0.1rem;
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--text);
    word-break: break-all;
  }

  /* 单行文本（lines）：圆角浅色框 + 框内透明圆形复制按钮，内容自动换行不出横向滚动条 */
  .copy-snippet {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.5rem;
    padding: 0.65rem 0.75rem 0.65rem 1rem;
    border: 1px solid var(--code-border);
    border-radius: 9999px;
    background: var(--code-bg);
    min-width: 0;
    max-width: 100%;
  }
  .copy-snippet__text {
    flex: 1 1 0;
    width: 0;
    min-width: 0;
    margin: 0;
    padding: 0.15rem 0;
    font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 长文本（texts）：圆角框 + 右上角透明复制按钮 */
  .copy-multiline {
    position: relative;
    display: flex;
    flex-direction: column;
    margin-top: 0.5rem;
    padding: 0.62rem 0.7rem;
    border: 1px solid var(--code-border);
    border-radius: 14px;
    background: var(--code-bg);
  }
  .copy-multiline__text {
    margin: 0;
    padding-right: 2.35rem;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    word-break: break-word;
    font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text);
  }

  /* 透明圆形复制按钮 */
  .copy-btn {
    flex-shrink: 0;
    align-self: center;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2.25rem;
    height: 2.25rem;
    margin: -0.15rem -0.25rem -0.15rem 0;
    padding: 0;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .copy-btn:hover {
    background: rgba(127, 127, 127, 0.14);
    color: var(--text);
  }
  .copy-btn:active { background: rgba(127, 127, 127, 0.22); }
  .copy-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .copy-btn.copied { color: var(--ok); }
  .copy-btn svg { width: 18px; height: 18px; }
  .copy-multiline__btn { position: absolute; top: 0.22rem; right: 0.22rem; align-self: auto; margin: 0; }

  .copy-feedback {
    margin: 0.12rem 0 0 0.2rem;
    font-size: 0.75rem;
    min-height: 0.85em;
    color: var(--ok);
  }
  .copy-feedback.err { color: var(--err); }

  /* 粘贴录入 */
  .paste-form { display: flex; flex-direction: column; gap: 10px; }
  .paste-form label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .paste-form input[type="text"],
  .paste-form textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--code-bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .paste-form input[type="text"]:focus,
  .paste-form textarea:focus {
    border-color: var(--accent);
  }
  .paste-form textarea {
    min-height: 96px;
    resize: vertical;
    font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .paste-title-row { display: none; }
  .paste-title-row.is-open { display: block; }
  .paste-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .paste-actions button {
    appearance: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .paste-actions .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-text);
  }
  .paste-actions .btn-primary:hover { filter: brightness(1.08); }
  .paste-actions .btn-primary:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    filter: none;
  }
  .paste-actions .btn-secondary {
    background: var(--panel-2);
    color: var(--text);
  }
  .paste-actions .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .paste-msg {
    font-size: 12px;
    min-height: 1.2em;
    color: var(--text-dim);
  }
  .paste-msg.ok { color: var(--ok); }
  .paste-msg.err { color: var(--err); }

  footer {
    margin-top: auto;
    width: 100%;
    padding: 20px 24px 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }
  footer a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  footer a:hover {
    color: var(--accent);
  }
  /* ============ 手机 / 窄屏适配 ============
     放在所有基础样式之后，确保能正确覆盖桌面端卡片样式。
     去掉卡片背景/边框/阴影/内边距，仅靠字体与排版分区。 */
  @media (max-width: 640px) {
    header { padding: 16px 16px 4px; }
    header h1 { font-size: 18px; }
    header .app-version { font-size: 12px; overflow-wrap: anywhere; word-break: break-word; }

    .layout { padding: 4px 16px 8px; gap: 0; }
    .col { gap: 0; }

    /* 卡片扁平化：无背景、无边框、无阴影、无圆角 */
    .card {
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
      margin-top: 22px;
    }
    .col > .card:first-child { margin-top: 6px; }

    /* 区块标题：去掉分隔线与内边距，用字号/字重区分 */
    .card > h2 {
      padding: 0 0 8px;
      border-bottom: none;
      font-size: 15px;
    }
    /* 内容区去掉左右内边距，靠页面级留白对齐 */
    .card-body { padding: 0; }

    ul.file-list a { padding: 12px 0; font-size: 15px; }
    .copy-snippet__text, .copy-multiline__text { font-size: 0.9rem; }

    footer { padding: 20px 16px 20px; margin-top: 12px; }
  }
</style>
</head>
<body>
  <header>
    <h1>局域网文件与文本分享</h1>
    <div id="app-version" class="app-version"></div>
  </header>

  <div class="layout">
    <!-- 左栏：文件列表 -->
    <div class="col">
      <section class="card">
        <h2>文件下载 <span class="count" id="files-count"></span></h2>
        <div class="card-body">
          <div id="files-status" class="status">正在加载…</div>
          <ul class="file-list" id="files-list"></ul>
        </div>
      </section>
    </div>

    <!-- 右栏：单行文本 + 长文本 + 粘贴录入 -->
    <div class="col">
      <section class="card">
        <h2>单行文本 <span class="count" id="lines-count"></span></h2>
        <div class="card-body">
          <div id="lines-status" class="status">正在加载…</div>
          <div id="lines-list"></div>
        </div>
      </section>

      <section class="card">
        <h2>长文本 <span class="count" id="texts-count"></span></h2>
        <div class="card-body">
          <div id="texts-status" class="status">正在加载…</div>
          <div id="texts-list"></div>
        </div>
      </section>

      <section class="card">
        <h2>粘贴文本</h2>
        <div class="card-body">
          <form class="paste-form" id="paste-form" autocomplete="off">
            <div class="paste-title-row" id="paste-title-row">
              <label for="paste-title">标题（可选）</label>
              <input type="text" id="paste-title" name="title" maxlength="80" placeholder="留空则用内容前几字或时间命名" />
            </div>
            <div>
              <label for="paste-text">内容</label>
              <textarea id="paste-text" name="text" rows="4" placeholder="在此粘贴或输入文本，Ctrl+V / ⌘V" required></textarea>
            </div>
            <div class="paste-actions">
              <button type="submit" class="btn-primary" id="paste-submit">保存</button>
              <button type="button" class="btn-secondary" id="paste-add-title">添加标题</button>
            </div>
            <div class="paste-msg" id="paste-msg" aria-live="polite"></div>
          </form>
        </div>
      </section>
    </div>
  </div>

  <footer>
    <div>局域网文件与文本分享工具 · 联系开发者：<a href="mailto:zhongwcool@163.com">zhongwcool@163.com</a></div>
  </footer>

<script>
(function () {
  "use strict";

  var COPY_ICON =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  var CHECK_ICON =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
  var FILE_ICON =
    '<svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
  var DOWNLOAD_ICON =
    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

  function el(tag, className) {
    var e = document.createElement(tag);
    if (className) e.className = className;
    return e;
  }

  function setStatus(id, message, isError) {
    var node = document.getElementById(id);
    node.textContent = message || "";
    node.style.display = message ? "block" : "none";
    node.className = "status" + (isError ? " error" : "");
  }

  function setCount(id, n) {
    document.getElementById(id).textContent = n > 0 ? n : "";
  }

  // 复制到剪贴板：优先 navigator.clipboard，降级 execCommand。
  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(function (resolve, reject) {
      try {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.top = "-9999px";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = document.execCommand("copy");
        document.body.removeChild(ta);
        ok ? resolve() : reject(new Error("execCommand 复制失败"));
      } catch (e) {
        reject(e);
      }
    });
  }

  function bindCopy(btn, feedback, getText) {
    btn.addEventListener("click", function () {
      copyText(getText()).then(
        function () {
          btn.classList.add("copied");
          btn.innerHTML = CHECK_ICON;
          feedback.textContent = "已复制到剪贴板";
          feedback.className = "copy-feedback ok";
          setTimeout(function () {
            btn.classList.remove("copied");
            btn.innerHTML = COPY_ICON;
            feedback.textContent = "";
            feedback.className = "copy-feedback";
          }, 2000);
        },
        function () {
          feedback.textContent = "复制失败，请手动选择文本复制";
          feedback.className = "copy-feedback err";
        }
      );
    });
  }

  // 渲染文件列表
  function renderFiles(files) {
    var list = document.getElementById("files-list");
    list.innerHTML = "";
    setCount("files-count", files.length);
    if (!files.length) {
      setStatus("files-status", "files/ 目录为空，暂无可下载文件。", false);
      return;
    }
    setStatus("files-status", "", false);
    files.forEach(function (name) {
      var li = el("li");
      var a = el("a");
      a.href = "/files/" + encodeURIComponent(name);
      a.setAttribute("download", "");
      var display;
      try {
        display = decodeURIComponent(name);
      } catch (e) {
        display = name;
      }
      a.innerHTML = FILE_ICON + '<span class="fname"></span><span class="dl" title="下载" aria-label="下载">' + DOWNLOAD_ICON + '</span>';
      a.querySelector(".fname").textContent = display;
      li.appendChild(a);
      list.appendChild(li);
    });
  }

  // 渲染单行文本
  function renderLines(lines) {
    var list = document.getElementById("lines-list");
    list.innerHTML = "";
    setCount("lines-count", lines.length);
    if (!lines.length) {
      setStatus("lines-status", "lines/ 目录为空，暂无单行文本。", false);
      return;
    }
    setStatus("lines-status", "", false);
    lines.forEach(function (item) {
      var wrap = el("div", "item");

      var title = el("div", "item-title");
      title.textContent = item.title;
      wrap.appendChild(title);

      var box = el("div", "copy-snippet");

      var code = el("code", "copy-snippet__text");
      // 单行展示：换行替换为空格再 trim；超出宽度时以省略号缩略，悬停显示完整内容。
      var oneLine = item.text.replace(/[\r\n]+/g, " ").trim();
      code.textContent = oneLine;
      code.title = oneLine;

      var btn = el("button", "copy-btn");
      btn.type = "button";
      btn.title = "复制";
      btn.innerHTML = COPY_ICON;

      box.appendChild(code);
      box.appendChild(btn);
      wrap.appendChild(box);

      var feedback = el("div", "copy-feedback");
      wrap.appendChild(feedback);

      bindCopy(btn, feedback, function () {
        return oneLine;
      });

      list.appendChild(wrap);
    });
  }

  // 渲染长文本
  function renderTexts(texts) {
    var list = document.getElementById("texts-list");
    list.innerHTML = "";
    setCount("texts-count", texts.length);
    if (!texts.length) {
      setStatus("texts-status", "texts/ 目录为空，暂无长文本。", false);
      return;
    }
    setStatus("texts-status", "", false);
    texts.forEach(function (item) {
      var wrap = el("div", "item");

      var title = el("div", "item-title");
      title.textContent = item.title;
      wrap.appendChild(title);

      var box = el("div", "copy-multiline");

      var btn = el("button", "copy-btn copy-multiline__btn");
      btn.type = "button";
      btn.title = "复制";
      btn.innerHTML = COPY_ICON;

      var pre = el("pre", "copy-multiline__text");
      pre.textContent = item.text;

      box.appendChild(btn);
      box.appendChild(pre);
      wrap.appendChild(box);

      var feedback = el("div", "copy-feedback");
      wrap.appendChild(feedback);

      // 长文本复制：保留原始换行。
      bindCopy(btn, feedback, function () {
        return item.text;
      });

      list.appendChild(wrap);
    });
  }

  // 安全渲染：单个区域出错不影响其它区域，并把错误显示在对应区域。
  function safeRender(name, statusId, fn, arg) {
    try {
      fn(arg);
    } catch (e) {
      console.error("渲染 " + name + " 失败：", e);
      setStatus(statusId, "渲染失败：" + (e && e.message ? e.message : e), true);
    }
  }

  function load() {
    fetch("/api/list", { cache: "no-store" })
      .then(function (resp) {
        if (!resp.ok) {
          throw new Error("服务器返回状态 " + resp.status);
        }
        return resp.json();
      })
      .then(function (data) {
        safeRender("文件", "files-status", renderFiles, Array.isArray(data.files) ? data.files : []);
        safeRender("单行文本", "lines-status", renderLines, Array.isArray(data.lines) ? data.lines : []);
        safeRender("长文本", "texts-status", renderTexts, Array.isArray(data.texts) ? data.texts : []);
      })
      .catch(function (err) {
        var msg = "加载失败：" + (err && err.message ? err.message : "无法连接到服务器");
        setStatus("files-status", msg, true);
        setStatus("lines-status", msg, true);
        setStatus("texts-status", msg, true);
      });
  }

  function loadVersion() {
    var node = document.getElementById("app-version");
    if (!node) return;
    fetch("/api/version", { cache: "no-store" })
      .then(function (resp) { return resp.ok ? resp.json() : null; })
      .then(function (v) {
        if (!v) return;
        var parts = [];
        if (v.version) parts.push(v.version);
        if (v.buildTime && v.buildTime !== "unknown") parts.push(v.buildTime);
        if (v.commit && v.commit !== "unknown") parts.push(v.commit.slice(0, 7));
        node.textContent = "";
        if (!parts.length) return;
        node.appendChild(document.createTextNode("版本 " + parts.join(" · ")));
        if (v.updateAvailable && v.latestVersion) {
          node.appendChild(document.createTextNode(" · "));
          var a = document.createElement("a");
          a.href = v.releaseURL || "https://github.com/zhongwcool/AceShare/releases";
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.className = "update-hint";
          a.textContent = "有新版本 " + v.latestVersion;
          node.appendChild(a);
        }
      })
      .catch(function () {});
  }

  // 粘贴录入：提交到 /api/paste，成功后 SSE 会自动刷新列表。
  function setPasteMsg(message, kind) {
    var node = document.getElementById("paste-msg");
    if (!node) return;
    node.textContent = message || "";
    node.className = "paste-msg" + (kind ? " " + kind : "");
  }

  function bindPasteForm() {
    var form = document.getElementById("paste-form");
    var textEl = document.getElementById("paste-text");
    var titleEl = document.getElementById("paste-title");
    var titleRow = document.getElementById("paste-title-row");
    var submitBtn = document.getElementById("paste-submit");
    var addTitleBtn = document.getElementById("paste-add-title");
    if (!form || !textEl) return;

    addTitleBtn.addEventListener("click", function () {
      titleRow.classList.add("is-open");
      addTitleBtn.hidden = true;
      titleEl.focus();
    });

    form.addEventListener("submit", function (ev) {
      ev.preventDefault();
      var text = textEl.value;
      if (!String(text).trim()) {
        setPasteMsg("请先粘贴或输入内容", "err");
        textEl.focus();
        return;
      }
      submitBtn.disabled = true;
      setPasteMsg("正在保存…", "");
      var title = titleRow.classList.contains("is-open") ? (titleEl.value || "") : "";
      fetch("/api/paste", {
        method: "POST",
        headers: { "Content-Type": "application/json; charset=utf-8" },
        body: JSON.stringify({
          title: title,
          text: text,
          kind: "auto"
        })
      })
        .then(function (resp) {
          return resp.text().then(function (body) {
            if (!resp.ok) {
              throw new Error(body || ("服务器返回 " + resp.status));
            }
            try {
              return JSON.parse(body);
            } catch (e) {
              return {};
            }
          });
        })
        .then(function (data) {
          var kindLabel = data.kind === "line" ? "单行文本" : "长文本";
          var savedTitle = data.title || "";
          setPasteMsg("已保存为" + kindLabel + (savedTitle ? "「" + savedTitle + "」" : ""), "ok");
          textEl.value = "";
          titleEl.value = "";
          titleRow.classList.remove("is-open");
          addTitleBtn.hidden = false;
          // SSE 通常会自动刷新；此处再拉一次，确保即时看到结果。
          scheduleReload();
        })
        .catch(function (err) {
          setPasteMsg("保存失败：" + (err && err.message ? err.message : err), "err");
        })
        .then(function () {
          submitBtn.disabled = false;
        });
    });
  }

  // 自动刷新：优先用 SSE 实时接收变化通知；SSE 不可用或断线时回退为定时轮询。
  var reloadTimer = null;
  function scheduleReload() {
    if (reloadTimer) clearTimeout(reloadTimer);
    reloadTimer = setTimeout(load, 150);
  }

  var pollTimer = null;
  function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(load, 5000);
  }
  function stopPolling() {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
  }

  function startAutoRefresh() {
    if (typeof EventSource === "undefined") {
      startPolling(); // 浏览器不支持 SSE，直接轮询
      return;
    }
    var es;
    try {
      es = new EventSource("/api/events");
    } catch (e) {
      startPolling();
      return;
    }
    es.addEventListener("change", function (ev) {
      // init 事件是连接建立时的初始同步，无需重复加载首屏。
      if (ev.data === "init") return;
      scheduleReload();
    });
    es.onopen = function () {
      stopPolling(); // SSE 正常，停止兜底轮询
    };
    es.onerror = function () {
      // 连接出错时启用轮询兜底；浏览器会自动尝试重连 SSE。
      startPolling();
    };
  }

  function init() {
    load();
    loadVersion();
    bindPasteForm();
    startAutoRefresh();
  }

  // 脚本位于 body 末尾，DOMContentLoaded 可能已触发，需兼容两种情况。
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
